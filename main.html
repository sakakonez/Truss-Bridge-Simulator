<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrussSim | STEM Group 3</title>
    <!-- Bootstrap for responsive layout and basic components -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* =========================================
           1. THEME VARIABLES 
           Change these colors to update the overall look!
           ========================================= */
        :root {
            --red-comp: #ff4d4d;    /* Compression color (Squeezing, Negative Force) */
            --blue-tens: #4db2ff;   /* Tension color (Pulling, Positive Force) */
            --black: #1d1d1f;       /* Primary text/dark color */
            --white: #ffffff;       /* Primary background */
            --gray: #86868b;        /* Subtext color */
            --apple-bg: #f5f5f7;    /* Light gray background sections */
            --apple-blue: #0071e3;  /* Primary button/link color */
        }

        /* Basic Page Setup */
        body {
            background-color: var(--white);
            color: var(--black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1.1rem; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Navbar */
        .navbar-custom {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            color: var(--black) !important;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* Multi-page Navigation Logic Styles */
        .page { display: none; }
        .page.active { display: block; }

        /* =========================================
           2. SIMULATION UI STYLES
           ========================================= */
        .sim-container {
            position: relative;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
            min-height: 440px; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
        }

        canvas { 
            width: 100%; 
            height: auto; 
            touch-action: none; /* Prevents scrolling while dragging on canvas */
            cursor: crosshair; 
        }

        /* Sidebar holding the draggable weights */
        .weight-sidebar {
            background: var(--apple-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* 2-Column Grid for weights */
        .weight-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        /* Individual weight card styling */
        .weight-item {
            cursor: grab;
            text-align: center;
            transition: all 0.2s ease;
            background: var(--white);
            padding: 20px 10px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.05);
            user-select: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .weight-item:active { cursor: grabbing; transform: scale(0.95); }
        .weight-item img { 
            pointer-events: none; 
            width: 60px !important;
            height: auto;
            margin-bottom: 10px;
        }
        .weight-item .weight-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--black);
        }

        /* Custom weight input box */
        .custom-weight-box {
            background: var(--white);
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Reset Button */
        .btn-reset {
            background: #e8e8ed;
            color: var(--black);
            font-size: 0.9rem;
            padding: 4px 15px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
            transition: background 0.2s;
        }
        .btn-reset:hover { background: #d1d1d6; }

        /* Decorative Dividers */
        .wave-to-grey { line-height: 0; margin-top: 40px; }
        .video-section { background-color: var(--apple-bg); padding: 20px 0; }
        .wave-container { line-height: 0; background-color: var(--apple-bg); }
        .wave-container svg { display: block; width: 100%; height: auto; fill: var(--white); }

        /* Video Embed Frame */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* =========================================
           3. QUIZ UI STYLES
           ========================================= */
        .quiz-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #f0f0f0;
        }

        .quiz-option {
            background: var(--apple-bg);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 500;
        }

        .quiz-option:hover { background: #eef1f5; border-color: #d2d2d7; }
        .quiz-option.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .quiz-option.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }

        /* General Apple-style Buttons */
        .btn-primary-apple {
            background-color: var(--apple-blue);
            color: white;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            border: none;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary-apple:hover { opacity: 0.9; transform: translateY(-2px); color: white; }

        .btn-outline-apple {
            background-color: transparent;
            color: var(--apple-blue);
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            border: 2px solid var(--apple-blue);
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-outline-apple:hover { background: var(--apple-blue); color: white; }

        /* Mobile Specific Adjustments */
        @media (max-width: 768px) {
            .weight-grid { grid-template-columns: 1fr 1fr; }
            .sim-container { min-height: auto; }
            .wave-to-grey { margin-top: 10px; } /* Removes extra space below simulation */
        }
    </style>
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-custom">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand" onclick="showPage('home')">TrussSim Pro</span>
        </div>
    </nav>

    <!-- PAGE 1: SIMULATION & VIDEO -->
    <div id="page-home" class="page active">
        <div class="container mt-4">
            <div class="row g-3">
                <!-- Left Column: The Interactive Bridge -->
                <div class="col-lg-8 col-md-12">
                    <div class="sim-container" id="canvas-wrapper">
                        <!-- Canvas where Javascript draws the bridge -->
                        <canvas id="trussCanvas"></canvas>
                        
                        <!-- Bottom info bar with total load and reset -->
                        <div class="px-3 py-2 w-100 text-center bg-white border-top">
                            <strong id="total-mass-display" style="font-size:1.6rem; font-weight:700;">Total Load: 0g</strong>
                            <div class="text-muted small lh-1 mb-1">Drag weights onto the <span style="color:var(--red-comp); font-weight:bold;">center joint</span> to test!</div>
                            <button class="btn-reset" onclick="resetWeights()">Reset Weights</button>
                        </div>
                    </div>
                </div>

                <!-- Right Column: The Weight Selection UI -->
                <div class="col-lg-4 col-md-12">
                    <div class="weight-sidebar">
                        <h6 class="text-center mb-4 fw-bold">Select & Drag Weights</h6>
                        <div class="weight-grid">
                            <!-- Weight Items (Both Draggable and Clickable) -->
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 25)" onclick="addWeight(25)">
                                <img src="https://img.icons8.com/ios-filled/100/4db2ff/weight.png" alt="25g">
                                <div class="weight-label">25g</div>
                            </div>
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 50)" onclick="addWeight(50)">
                                <img src="https://img.icons8.com/ios-filled/100/4db2ff/weight.png" alt="50g">
                                <div class="weight-label">50g</div>
                            </div>
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 100)" onclick="addWeight(100)">
                                <img src="https://img.icons8.com/ios-filled/100/4db2ff/weight.png" alt="100g">
                                <div class="weight-label">100g</div>
                            </div>
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 500)" onclick="addWeight(500)">
                                <img src="https://img.icons8.com/ios-filled/100/4db2ff/weight.png" alt="500g">
                                <div class="weight-label">500g</div>
                            </div>
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 1000)" onclick="addWeight(1000)">
                                <img src="https://img.icons8.com/ios-filled/100/4db2ff/weight.png" alt="1kg">
                                <div class="weight-label">1kg</div>
                            </div>
                            <div class="weight-item" draggable="true" ondragstart="handleDragStart(event, 10000)" onclick="addWeight(10000)">
                                <img src="https://img.icons8.com/ios-filled/100/ff4d4d/weight.png" alt="10kg">
                                <div class="weight-label">10kg</div>
                            </div>
                        </div>

                        <!-- Custom Weight Input Box -->
                        <div class="custom-weight-box mt-4">
                            <label class="small fw-bold mb-2 d-block">Custom Load (grams)</label>
                            <div class="input-group input-group-sm">
                                <input type="number" id="customWeightInput" class="form-control" placeholder="e.g. 250">
                                <button class="btn btn-primary" onclick="addCustomWeight()">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wave transition to Video Section -->
        <div class="wave-to-grey">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120"><path fill="#f5f5f7" fill-opacity="1" d="M0,64L48,69.3C96,75,192,85,288,85.3C384,85,480,75,576,64C672,53,768,43,864,48C960,53,1056,75,1152,80C1248,85,1344,75,1392,69.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
        </div>

        <div class="video-section">
            <div class="container">
                <h2 class="text-center mb-4 fw-bold">How Trusses Work</h2>
                <div class="video-container">
                    <!-- YouTube Video Embed -->
                    <iframe src="https://www.youtube.com/embed/AuXeOznHu_w" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <!-- Wave transition back to white background -->
        <div class="wave-container">
            <svg viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg"><path d="M0,64L48,69.3C96,75,192,85,288,85.3C384,85,480,75,576,64C672,53,768,43,864,48C960,53,1056,75,1152,80C1248,85,1344,75,1392,69.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
        </div>

        <!-- Bottom Call to Action for Quiz -->
        <div class="container text-center py-5">
            <h2 class="fw-bold">Ready to test your knowledge?</h2>
            <button class="btn-primary-apple" onclick="showPage('quiz')">Take the Quiz Now &rarr;</button>
        </div>
    </div>

    <!-- PAGE 2: QUIZ SECTION -->
    <div id="page-quiz" class="page">
        <div class="container py-5">
            <div class="quiz-card">
                
                <!-- Quiz Question View -->
                <div id="quiz-container">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold m-0">Engineering Quiz</h3>
                        <span id="quiz-progress" class="badge bg-secondary rounded-pill p-2">Question 1/10</span>
                    </div>
                    <h4 id="question-text" class="mb-4">Loading question...</h4>
                    <div id="options-container"></div>
                    <div class="mt-4 text-center">
                        <button id="next-btn" class="btn btn-dark px-4 py-2 rounded-pill d-none" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>

                <!-- Result View (Hidden by default) -->
                <div id="result-container" class="text-center d-none">
                    <h1 class="display-3 mb-3">🎉</h1>
                    <h2 class="fw-bold">Quiz Complete!</h2>
                    <p class="lead" id="final-score"></p>
                    <div class="d-grid gap-2 d-md-block">
                        <button class="btn-primary-apple me-2" onclick="startQuiz()">Restart Quiz</button>
                        <button class="btn-outline-apple" onclick="showPage('home')">Return to Simulation</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- =========================================
         JAVASCRIPT CORE LOGIC
         ========================================= -->
    <script>
        /* ---------------------------------------------------
           PART 1: STATE & CONFIGURATION
           Variables tracking the mass and Canvas context
           --------------------------------------------------- */
        const colors = { 
            red: '#ff4d4d',    // Force < 0 (Compression)
            blue: '#4db2ff',   // Force > 0 (Tension)
            black: '#1d1d1f',  // Joints / Text
            white: '#ffffff', 
            gray: '#e0e0e0'    // Resting state color
        };
        
        let totalMassGrams = 0;   // The total weight applied
        let stackedWeights = [];  // Array keeping track of blocks drawn below the bridge
        let isDraggingOver = false; // Tracks if user is dragging over the drop zone

        const canvas = document.getElementById('trussCanvas');
        const ctx = canvas.getContext('2d');

        /* ---------------------------------------------------
           PART 2: BRIDGE GEOMETRY
           Coordinates for a 4-panel Warren Truss
           --------------------------------------------------- */
        // Calculate equilateral triangles based on Length (L) and Height (H)
        const L = 230; 
        const H = L * Math.sin(Math.PI / 3); // sin(60 degrees)
        const startX = 40; 
        const baseY = 340; 

        // Joint Positions Array (x, y)
        const joints = [
            // Bottom row nodes (indices 0 to 4)
            { x: startX, y: baseY }, 
            { x: startX + L, y: baseY }, 
            { x: startX + 2*L, y: baseY }, // Node 2: Center node where load is applied
            { x: startX + 3*L, y: baseY }, 
            { x: startX + 4*L, y: baseY }, 
            // Top row nodes (indices 5 to 8)
            { x: startX + L/2, y: baseY - H }, 
            { x: startX + 1.5*L, y: baseY - H },
            { x: startX + 2.5*L, y: baseY - H }, 
            { x: startX + 3.5*L, y: baseY - H }
        ];

        // Members Array connecting Joint A to Joint B
        const members = [
            { a: 0, b: 1 }, { a: 1, b: 2 }, { a: 2, b: 3 }, { a: 3, b: 4 }, // Bottom Chords
            { a: 5, b: 6 }, { a: 6, b: 7 }, { a: 7, b: 8 },                 // Top Chords
            { a: 0, b: 5 }, { a: 5, b: 1 }, { a: 1, b: 6 },                 // Diagonals Left
            { a: 6, b: 2 }, { a: 2, b: 7 },                                 // Diagonals Center
            { a: 7, b: 3 }, { a: 3, b: 8 }, { a: 8, b: 4 }                  // Diagonals Right
        ];

        /* ---------------------------------------------------
           PART 3: PHYSICS ENGINE (METHOD OF JOINTS)
           Calculates real axial forces based on structural analysis
           --------------------------------------------------- */
        function calculateMemberForces() {
            // If no weight is applied, return all zeroes
            if (totalMassGrams <= 0) {
                return members.map(() => 0); 
            }

            // Convert total mass to Load force in Newtons
            const m = totalMassGrams / 1000; // Grams to kg
            const Load = m * 9.81; // F = ma
            
            // Method of Joints parameters for 60-degree angles
            const S = Math.sin(Math.PI / 3); // sin(60)
            const T = Math.tan(Math.PI / 3); // tan(60)

            // Array containing the Exact Force for each member respectively
            // Rule: Positive (+) = Tension, Negative (-) = Compression
            return [
                /* Bottom Chords */
                (Load / 2) / T,         // 0-1 (Tension)
                (1.5 * Load) / T,       // 1-2 (Tension)
                (1.5 * Load) / T,       // 2-3 (Tension)
                (Load / 2) / T,         // 3-4 (Tension)
                
                /* Top Chords */
                -(Load) / T,            // 5-6 (Compression)
                -(2 * Load) / T,        // 6-7 (Compression)
                -(Load) / T,            // 7-8 (Compression)
                
                /* Diagonals */
                -(Load / 2) / S,        // 0-5 (Outer Left, Compression)
                (Load / 2) / S,         // 5-1 (Inner Left, Tension)
                -(Load / 2) / S,        // 1-6 (Inner Left, Compression)
                (Load / 2) / S,         // 6-2 (Center Left, Tension)
                (Load / 2) / S,         // 2-7 (Center Right, Tension)
                -(Load / 2) / S,        // 7-3 (Inner Right, Compression)
                (Load / 2) / S,         // 3-8 (Inner Right, Tension)
                -(Load / 2) / S         // 8-4 (Outer Right, Compression)
            ];
        }

        /* ---------------------------------------------------
           PART 4: RENDERING ENGINE
           Draws graphics onto the HTML Canvas
           --------------------------------------------------- */
        function initCanvas() {
            canvas.width = 1000;
            canvas.height = 460; 
            drawBridge();
        }

        function drawBridge() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fetch calculated forces array
            const forces = calculateMemberForces();

            // 1. Draw Drop Zone visual indicator (Circle around joint 2)
            if (isDraggingOver) {
                ctx.beginPath();
                ctx.arc(joints[2].x, joints[2].y, 60, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(77, 178, 255, 0.2)';
                ctx.fill();
                ctx.strokeStyle = colors.blue;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 2. Draw all Bridge Members (beams)
            members.forEach((m, index) => {
                const j1 = joints[m.a]; 
                const j2 = joints[m.b];
                const force = forces[index]; // Map force to this specific member
                
                ctx.beginPath();
                ctx.lineCap = 'round';
                
                if (totalMassGrams === 0) { 
                    // No load = resting gray state
                    ctx.lineWidth = 14; 
                    ctx.strokeStyle = colors.gray; 
                } else { 
                    // Automatically color based on math (+ is Blue, - is Red)
                    if (force < 0) {
                        ctx.strokeStyle = colors.red;   // Compression
                        ctx.lineWidth = 32;            // Make compression members thicker
                    } else if (force > 0) {
                        ctx.strokeStyle = colors.blue;  // Tension
                        ctx.lineWidth = 18;            // Standard thickness
                    } else {
                        ctx.strokeStyle = colors.gray;  // Zero force
                        ctx.lineWidth = 14;
                    }
                }
                
                ctx.moveTo(j1.x, j1.y); 
                ctx.lineTo(j2.x, j2.y); 
                ctx.stroke();

                // Draw Numerical Text Labels over members
                if (totalMassGrams > 0) {
                    ctx.fillStyle = colors.black; 
                    ctx.font = "bold 28px Arial";
                    const midX = (j1.x + j2.x) / 2; 
                    const midY = (j1.y + j2.y) / 2;
                    
                    // Format string to show + for tension, - for compression
                    const sign = force > 0 ? "+" : "";
                    const textLabel = sign + force.toFixed(2) + "N";

                    // Create white outline for text readability
                    ctx.strokeStyle = "white"; 
                    ctx.lineWidth = 8;
                    ctx.strokeText(textLabel, midX - 45, midY - 5);
                    ctx.fillText(textLabel, midX - 45, midY - 5);
                }
            });

            // 3. Draw Joints (Pins)
            joints.forEach((j, i) => {
                ctx.beginPath(); 
                ctx.arc(j.x, j.y, 20, 0, Math.PI * 2);
                // Highlight load joint (Index 2) red when empty to attract attention
                ctx.fillStyle = (i === 2 && totalMassGrams === 0) ? colors.red : (totalMassGrams > 0 ? colors.black : colors.white);
                ctx.fill(); 
                ctx.strokeStyle = "#000"; 
                ctx.lineWidth = 3; 
                ctx.stroke();
            });

            // 4. Draw Weights hanging under center load joint
            const centerX = joints[2].x;
            stackedWeights.forEach((w, index) => {
                const x = centerX - 60; 
                const y = baseY + 25 + (index * 60);
                
                ctx.fillStyle = "#1d1d1f"; 
                ctx.beginPath(); 
                ctx.roundRect(x, y, 120, 50, 8); 
                ctx.fill();
                
                ctx.fillStyle = "white"; 
                ctx.font = "bold 24px Arial"; 
                ctx.textAlign = "center";
                ctx.fillText(w >= 1000 ? (w/1000)+'kg' : w+'g', centerX, y + 33); 
                ctx.textAlign = "left";
            });

            // Update DOM HTML display text
            const displayMass = totalMassGrams >= 1000 ? (totalMassGrams/1000).toFixed(2) + 'kg' : totalMassGrams + 'g';
            document.getElementById('total-mass-display').innerText = `Total Load: ${displayMass}`;
        }

        /* ---------------------------------------------------
           PART 5: INTERACTION & LOGIC (Drag/Drop/Click)
           --------------------------------------------------- */
        // Page Navigation
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            window.scrollTo(0,0);
            if(pageId === 'quiz') startQuiz();
        }

        let currentDraggedValue = 0;

        // Called when user starts dragging a weight block
        function handleDragStart(e, val) {
            currentDraggedValue = val;
            e.dataTransfer.setData("text/plain", val.toString());
            e.dataTransfer.effectAllowed = "move";
        }

        // Drag events over canvas
        canvas.addEventListener('dragenter', (e) => {
            e.preventDefault();
            isDraggingOver = true;
            drawBridge(); // Triggers drop zone highlight
        });

        canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
        });

        canvas.addEventListener('dragleave', (e) => {
            isDraggingOver = false;
            drawBridge(); // Removes drop zone highlight
        });

        // Triggered when weight is dropped
        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            isDraggingOver = false;
            
            // Math to translate screen coordinates to canvas coordinates
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // Check if dropped near the center load joint (Joint Index 2)
            const targetX = joints[2].x;
            const targetY = joints[2].y;
            const distance = Math.sqrt(Math.pow(mouseX - targetX, 2) + Math.pow(mouseY - targetY, 2));

            // Permissive drop radius
            if (distance < 150 || (Math.abs(mouseX - targetX) < 80 && mouseY > targetY - 100)) {
                addWeight(currentDraggedValue);
            }
            drawBridge();
        });

        // Add numerical weight to state and redraw
        function addWeight(val) {
            if (!val || val <= 0) return;
            totalMassGrams += val; 
            stackedWeights.push(val);
            if (stackedWeights.length > 3) stackedWeights.shift(); // Max 3 visual blocks
            drawBridge();
        }

        function addCustomWeight() {
            const input = document.getElementById('customWeightInput');
            const val = parseInt(input.value);
            if (val > 0) {
                addWeight(val);
                input.value = ''; // clear input
            }
        }

        function resetWeights() {
            totalMassGrams = 0; 
            stackedWeights = [];
            drawBridge();
        }

        /* ---------------------------------------------------
           PART 6: QUIZ SYSTEM
           Handles questions, validation, and scoring
           --------------------------------------------------- */
        const quizData = [
            { q: "What kind of force is acting on a member being squeezed (represented by negative values / RED)?", options: ["Tension", "Compression", "Torsion", "Shear"], correct: 1 },
            { q: "In a simple Warren Truss with a center load, the bottom horizontal members are primarily in:", options: ["Compression", "Equilibrium", "Tension", "Free Motion"], correct: 2 },
            { q: "What shape is the fundamental building block of a Truss bridge?", options: ["Square", "Circle", "Triangle", "Hexagon"], correct: 2 },
            { q: "Which member type resists being pulled apart (represented by positive values / BLUE)?", options: ["Compression", "Tension", "Shear", "Friction"], correct: 1 },
            { q: "Who is credited with patenting the Warren Truss in 1848?", options: ["James Warren", "John Roebling", "Gustave Eiffel", "Isambard Brunel"], correct: 0 },
            { q: "Truss bridges are efficient because they primarily handle forces in which way?", options: ["Bending", "Axial (Push/Pull)", "Twisting", "Vertical Gravity only"], correct: 1 },
            { q: "According to the Method of Joints, what happens to the internal forces if you double the load on the bridge?", options: ["They stay the same", "They decrease", "They exactly double", "They square"], correct: 2 },
            { q: "Where is the load typically applied in a truss for maximum efficiency to avoid bending?", options: ["Mid-member", "Directly at the Joints/Nodes", "On the supports", "Randomly"], correct: 1 },
            { q: "A 'Tie' member in a bridge is another name for a member in:", options: ["Compression", "Tension", "Static", "Rotation"], correct: 1 },
            { q: "Why are triangles used instead of squares in trusses?", options: ["They look better", "They are cheaper", "They are naturally rigid and don't deform", "They use less paint"], correct: 2 }
        ];

        let currentQ = 0; let score = 0; let canAnswer = true;

        function startQuiz() {
            currentQ = 0; 
            score = 0;
            document.getElementById('quiz-container').classList.remove('d-none');
            document.getElementById('result-container').classList.add('d-none');
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            const data = quizData[currentQ];
            document.getElementById('quiz-progress').innerText = `Question ${currentQ + 1}/${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('next-btn').classList.add('d-none');
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function selectOption(idx, element) {
            if (!canAnswer) return; // Prevent multiple clicks
            canAnswer = false;
            
            const correct = quizData[currentQ].correct;
            const options = document.querySelectorAll('.quiz-option');
            
            if (idx === correct) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                options[correct].classList.add('correct'); // Show correct answer
            }
            document.getElementById('next-btn').classList.remove('d-none');
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-container').classList.add('d-none');
            document.getElementById('result-container').classList.remove('d-none');
            document.getElementById('final-score').innerText = `Your score: ${score} / ${quizData.length}`;
        }

        // Initialize simulation on first load
        window.onload = initCanvas;
        // Redraw canvas natively when device is rotated/resized
        window.onresize = () => initCanvas();
    </script>
</body>
</html>
